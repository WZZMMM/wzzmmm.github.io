    <style>:root {
  --scrollbar-thumb: #c0c0c0;
  --scrollbar-thumb-hover: #a0a0a0;
  --scrollbar-track: transparent;
}

        body {
            font-family: 'Century', 'Georgia', 'PT Serif', 'SimSun', Times, serif;
            margin: 0;
            padding: 0;
            background-image: url('../../reading_bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #f5f5f5;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }
        
        .container {
            max-width: 900px;
            padding: 2rem;
            margin: 2rem;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: left;
        }
        
        a {
            color: #77a0ab;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        a:hover {
            text-decoration: underline;
        }
        
        h1 {
            font-size: 1.8em;
            text-align: center;
            margin-bottom: 0.5rem;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 10px;
        }
        
        h2 {
            font-size: 1.5em;
            text-align: center;
            color: #fff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 0.5rem;
            margin-top: 2rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
        
        h3 {
            font-size: 1.3em;
            font-weight: normal;
            text-align: center;
        }
        
        h4 {
            font-size: 1.2em;
            font-weight: normal;
            text-align: center;
        }
        
        h5 {
            font-size: 1.1em;
            font-weight: normal;
            text-align: center;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #ddd;
            margin-bottom: 2rem;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
        
        .intro, .projects {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border-radius: 8px;
            margin: 1.5rem 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        p, li {
            line-height: 1.6;
            color: #eee;
        }
        
        ul {
            padding-left: 1.5rem;
        }
        
        li {
            margin-bottom: 0.5rem;
            position: relative;
        }
        
        .more-info {
            text-align: right;
            margin-top: 1rem;
        }
        
        .more-info a {
            display: inline-flex;
            align-items: center;
        }
        
        .more-info a::after {
            content: "→";
            margin-left: 0.5rem;
            transition: transform 0.3s ease;
        }
        
        .more-info a:hover::after {
            transform: translateX(3px);
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 1.5rem;
                margin: 1.5rem;
            }
            
            h1 {
                font-size: 1.6em;
            }
            
            .subtitle {
                font-size: 1rem;
            }
        }
        
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0a0a0a;
            }
        }
::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}
::-webkit-scrollbar-track {
  background: transparent;
  border-radius: 4px;
}
::-webkit-scrollbar-thumb {
  background: var(--scrollbar-thumb);
  border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
  background: var(--scrollbar-thumb-hover);
}
* {
  scrollbar-width: thin;
  scrollbar-color: var(--scrollbar-thumb) transparent;
}
</style>
